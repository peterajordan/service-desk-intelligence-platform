<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <title>Service Desk Intelligence Dashboard</title>
   <style>
      body {
         background-color: #050505;
         color: #00ff41;
         font-family: Arial, sans-serif;
         margin: 0;
         padding: 30px;
      }

      h1 {
         text-align: center;
      }

      .grid {
         display: grid;
         grid-template-columns: repeat(3, 1fr);
         gap: 20px;
         margin-top: 30px;
      }

      .card {
         border: 1px solid #00ff41;
         padding: 20px;
         border-radius: 8px;
         background-color: #0b0b0b;
      }

      .number {
         font-size: 36px;
         font-weight: bold;
      }

      table {
         width: 100%;
         margin-top: 30px;
         border-collapse: collapse;
      }

      th, td {
         border: 1px solid #00ff41;
         padding: 10px;
         text-align: left;
      }
   </style>
</head>
<body>

   <h1>Service Desk Intelligence Dashboard</h1>

   <div class="grid">
      <div class="card">
         <h2>Open Tickets</h2>
         <div class="number">24</div>
      </div>

      <div class="card">
         <h2>Critical Incidents</h2>
         <div class="number">3</div>
      </div>

      <div class="card">
         <h2>AI Classifications</h2>
         <div class="number">18</div>
      </div>
   </div>

   <table>
      <tr>
         <th>Ticket ID</th>
         <th>Issue</th>
         <th>Priority</th>
         <th>Status</th>
      </tr>
      <tr>
         <td>1001</td>
         <td>VPN connection failure</td>
         <td>Critical</td>
         <td>In Progress</td>
      </tr>
      <tr>
         <td>1002</td>
         <td>Outlook not syncing</td>
         <td>Moderate</td>
         <td>Open</td>
      </tr>
      <tr>
         <td>1003</td>
         <td>Suspicious email reported</td>
         <td>High</td>
         <td>Escalated</td>
      </tr>
   </table>

</body>
</html>
